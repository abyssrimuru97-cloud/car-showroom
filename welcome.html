<!DOCTYPE html>
<html>
<head>
    <title>Car Dashboard</title>
    <style>
        body{
            font-family:Arial,sans-serif;
            background:#f2f2f2;
            margin:0;
        }

        h1{
            text-align:center;
            background:#333;
            color:white;
            padding:20px;
            margin:0;
        }

        .container{
            display:flex;
            justify-content:center;
            flex-wrap:wrap;
            margin:30px;
        }

        .card{
            width:250px;
            background:white;
            border-radius:10px;
            box-shadow:0 0 10px gray;
            margin:20px;
            text-align:center;
            padding-bottom:20px;
        }

        .card img{
            width:100%;
            height:180px;
            border-radius:10px 10px 0 0;
        }

        .card h2{
            color:#333;
        }

        .card p{
            color:#666;
        }

        button{
            background:#007BFF;
            color:white;
            border:none;
            padding:10px 20px;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }
    </style>
</head>
<body>

<h1>Car Showroom</h1>

<div class="container">

    <div class="card">
    <img src="bmw.jpg.jpg" alt="BMW M4">
    <h2>BMW M4</h2>
    <p>Price: ₹95 Lakhs</p>

    <a href="bmw.html">
        <button>View</button>
    </a>
</div>

    <div class="card">
        <img src="audi.jpg.jpg" alt="Audi R8">
        <h2>Audi R8</h2>
        <p>Price: ₹2.3 Crore</p>
        <a href="audi.html">
    <button>View</button>
</a>
    </div>

    <div class="card">
        <img src="mercedesamg.jpg.jpg" alt="Mercedes AMG">
        <h2>Mercedes AMG</h2>
        <p>Price: ₹1.8 Crore</p>
        <a href="mercedesamg.html">
    <button>View</button>
</a>
    </div>

</div>

</body>
</html>
